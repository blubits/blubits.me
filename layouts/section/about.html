{{ define "nav" }}
  {{ partial "nav.html" . }}
{{ end }}
{{ define "main" }}
  {{ partial "header.html" . }}
  {{ partial "content.html" . }}
{{ end }}
{{ define "js" }}
  {{ with .Site.GetPage "section" "about" }}
  <script>
    document.querySelector("#cover").style.backgroundImage = 'url(' + drawTiles(
      {{ index .Params.color 0 | float }},
      {{ index .Params.color 1 | float }}, 
      {{ index .Params.color 2 | float }}
    ) + ')';
  </script>
  {{ end }}
{{ end }}
